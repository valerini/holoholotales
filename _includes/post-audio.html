{% assign folder = page.path | split: '/' | last | remove: '.html' %}
{% assign images_path = '/assets/audio/' | append: folder | append: '.mp3' %}

<audio controls {% if include.style %}style="{{ include.style }}"{% endif %}>
  <source src="{{ images_path | append: include.file | relative_url }}" type="audio/mpeg">
</audio>
